name: native_liquid_glass
description: "Liquid Glass iOS platform views for Flutter using native UIKit components."
version: 0.2.5
homepage: https://github.com/tienanh306201z/native_liquid_glass
repository: https://github.com/tienanh306201z/native_liquid_glass

topics:
  - ui
  - ios
  - liquid-glass
  - uikit

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.2"

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.1.0
  path_parsing: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: NativeLiquidGlassPlugin
